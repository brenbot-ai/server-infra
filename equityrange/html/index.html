<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equity Range</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 2.5rem; font-weight: 700; color: #f6c90e; margin-bottom: 0.5rem; }
    p  { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .links a {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border-radius: 6px;
      background: #1e2535;
      color: #e2e8f0;
      text-decoration: none;
      border: 1px solid #2d3748;
      transition: background 0.2s;
    }
    .links a:hover { background: #2d3748; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Equity Range</h1>
    <p>Projects &amp; tools by Brian Brenneke</p>
    <div class="links">
      <a href="https://poker.equityrange.com">🃏 Poker Tracker</a>
      <!-- Add new projects here -->
    </div>
  </div>
</body>
</html>
