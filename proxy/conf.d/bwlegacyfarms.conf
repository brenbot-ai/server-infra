# bwlegacyfarms.com — B&W Legacy Farms static site

# HTTP: ACME challenge + redirect to HTTPS apex
server {
    listen 80;
    server_name bwlegacyfarms.com www.bwlegacyfarms.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://bwlegacyfarms.com$request_uri;
    }
}

# HTTPS www → apex redirect
server {
    listen 443 ssl;
    http2 on;
    server_name www.bwlegacyfarms.com;

    ssl_certificate     /etc/letsencrypt/live/bwlegacyfarms.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bwlegacyfarms.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://bwlegacyfarms.com$request_uri;
}

# HTTPS apex — serve static site
server {
    listen 443 ssl;
    http2 on;
    server_name bwlegacyfarms.com;

    ssl_certificate     /etc/letsencrypt/live/bwlegacyfarms.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bwlegacyfarms.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    root /home/ubuntu/bwlegacyfarms;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
