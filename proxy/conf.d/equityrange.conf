# equityrange.com — root domain
# Serves a static site from /opt/equityrange/html (or swap proxy_pass for an app)

server {
    listen 80;
    server_name equityrange.com www.equityrange.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://equityrange.com$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name equityrange.com www.equityrange.com;

    ssl_certificate     /etc/letsencrypt/live/equityrange.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/equityrange.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    root /var/www/equityrange;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
