# poker.equityrange.com — poker tracker app
# Backend: poker-tracker-app container on proxy-net

server {
    listen 80;
    server_name poker.equityrange.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name poker.equityrange.com;

    ssl_certificate     /etc/letsencrypt/live/poker.equityrange.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poker.equityrange.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Basic auth — .htpasswd file must exist at /opt/proxy/auth/.htpasswd
    # Copy it from /opt/poker-tracker/nginx/auth/.htpasswd if it exists there
    auth_basic "Poker Tracker";
    auth_basic_user_file /etc/nginx/auth/.htpasswd;

    location / {
        proxy_pass         http://poker-tracker-app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
